name: Issue to Task Message

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  generate-agent-request:
    runs-on: ubuntu-latest
    steps:
      - name: Generate agent request comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title;

            // Parse CLE2-ID from title (e.g., "[CLE2-4] ..." -> "4")
            const match = title.match(/\[CLE2-(\d+)\]/);
            const cle2Id = match ? match[1] : null;

            if (!cle2Id) {
              core.info('Not a CLE2 issue, skipping.');
              return;
            }

            // Extract description (before the --- line)
            const body = issue.body || '';
            const descMatch = body.split('\n---\n')[0] || body;
            const description = descMatch.trim();

            // Build agent request message for Discord
            const discordMessage = [
              `📋 **새 요구사항 등록 — CLE2-${cle2Id}**`,
              ``,
              `**제목:** ${title}`,
              `**이슈:** ${issue.html_url}`,
              ``,
              `---`,
              ``,
              `@대구루 아래 요구사항을 분석해서 task를 생성해줘.`,
              ``,
              `**요구사항:** ${title.replace(/^\[CLE2-\d+\]\s*/, '')}`,
              `**설명:**`,
              description,
              `**이슈 URL:** ${issue.html_url}`,
              ``,
              `tasks/CLE2-${cle2Id}/ 디렉토리에 GOAL.md, DISCOVERY.md, PLAN.md, STATUS.md, TESTS.md, DECISIONS.md를 작성해서 PR로 올려줘.`,
              `DISCOVERY.md에는 Unknown Map, 사용할 도구, 레퍼런스, 사람 결정 항목을 포함해줘.`
            ].join('\n');

            // Create comment on the issue (for GitHub record)
            const commentBody = [
              '📋 **대구루에게 요청:**',
              '',
              `CLE2-${cle2Id} 태스크 생성해줘.`,
              '',
              `**요구사항:** ${title.replace(/^\[CLE2-\d+\]\s*/, '')}`,
              `**설명:** ${description}`,
              `**이슈:** ${issue.html_url}`,
              '',
              '표준 태스크 문서: GOAL / DISCOVERY / PLAN / STATUS / TESTS / DECISIONS',
              'DISCOVERY에는 Unknown Map, 도구, 레퍼런스와 사람 결정 항목을 기록합니다.',
              '',
              '---',
              '🤖 Discord로 에이전트 요청이 전송되었습니다.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: commentBody
            });

            core.info(`Agent request comment added to issue #${issue.number}`);

            // Save Discord message for next step
            core.setOutput('discord_message', discordMessage);
            core.setOutput('cle2_id', cle2Id);
            core.setOutput('issue_number', issue.number);
            core.setOutput('issue_url', issue.html_url);
            core.setOutput('issue_title', title);

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MESSAGE: ${{ steps.generate-agent-request.outputs.discord_message }}
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "$(jq -n --arg msg "$MESSAGE" '{content: $msg}')" \
            "$DISCORD_WEBHOOK_URL"
