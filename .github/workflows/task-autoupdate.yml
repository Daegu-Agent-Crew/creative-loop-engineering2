name: Auto Update Task Status

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull_requests: read

jobs:
  update-task-status:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse CLE2 ID and update STATUS.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const title = pr.title;
            
            // Parse CLE2-ID from PR title or labels
            const match = title.match(/CLE2-(\d+)/i);
            if (!match) {
              core.info('No CLE2-ID found in PR title, skipping.');
              return;
            }
            const cle2Id = match[1];
            const today = new Date().toISOString().slice(0, 10);
            
            // Find task directory
            const taskBase = `tasks/CLE2-${cle2Id}`;
            const { exec } = require('child_process');
            
            // Find the slug directory
            let slugDir = '';
            try {
              const entries = fs.readdirSync(taskBase);
              for (const entry of entries) {
                const stat = fs.statSync(`${taskBase}/${entry}`);
                if (stat.isDirectory()) {
                  slugDir = entry;
                  break;
                }
              }
            } catch (e) {
              core.info(`No task directory found for CLE2-${cle2Id}, skipping.`);
              return;
            }
            
            if (!slugDir) {
              core.info('No slug directory found, skipping.');
              return;
            }
            
            const statusPath = `${taskBase}/${slugDir}/STATUS.md`;
            if (!fs.existsSync(statusPath)) {
              core.info('STATUS.md not found, skipping.');
              return;
            }
            
            // Update STATUS.md
            let content = fs.readFileSync(statusPath, 'utf8');
            
            // Replace status
            content = content.replace(/## нҳ„мһ¬ мғҒнғң\n[рҹ”„вң…вҸёпёҸ].*$/m, `## нҳ„мһ¬ мғҒнғң\nвң… мҷ„лЈҢ`);
            content = content.replace(/рҹ”„ м§„н–ү мӨ‘/g, 'вң… мҷ„лЈҢ');
            content = content.replace(/вҸёпёҸ лҢҖкё°/g, 'вң… мҷ„лЈҢ');
            
            // Update progress to full
            const phaseMatch = content.match(/м „мІҙ Phase:\s*(\d+)\/(\d+)/);
            if (phaseMatch) {
              const total = phaseMatch[2];
              content = content.replace(/м „мІҙ Phase:\s*\d+\/\d+\s*мҷ„лЈҢ/, `м „мІҙ Phase: ${total}/${total} мҷ„лЈҢ`);
              content = content.replace(/нҳ„мһ¬ Phase:.*$/m, 'нҳ„мһ¬ Phase: мҷ„лЈҢ');
            }
            
            // Move м§„н–ү мӨ‘ items to мҷ„лЈҢ
            const inProgressMatch = content.match(/## м§„н–ү мӨ‘мқё мһ‘м—…\n((?:- \[ \].*\n)*)/);
            if (inProgressMatch && inProgressMatch[1].trim()) {
              const completedSection = content.match(/## мҷ„лЈҢлҗң мһ‘м—…\n((?:- \[x\].*\n)*)/);
              const inProgressItems = inProgressMatch[1].replace(/- \[ \]/g, '- [x]');
              if (completedSection) {
                content = content.replace(
                  /(## мҷ„лЈҢлҗң мһ‘м—…\n(?:- \[x\].*\n)*)/,
                  `$1${inProgressItems}`
                );
              }
              content = content.replace(
                /## м§„н–ү мӨ‘мқё мһ‘м—…\n(?:- \[ \].*\n)*/,
                '## м§„н–ү мӨ‘мқё мһ‘м—…\n- (м—ҶмқҢ)\n'
              );
            }
            
            // Add changelog entry
            const changelogEntry = `| ${today} | PR #${pr.number} лЁём§Җ мҷ„лЈҢ, мғҒнғң doneмңјлЎң м—…лҚ°мқҙнҠё | GitHub Actions |`;
            if (content.includes('## ліҖкІҪ мқҙл Ҙ')) {
              const lastRow = content.lastIndexOf('|---');
              if (lastRow >= 0) {
                const insertPos = content.indexOf('\n', lastRow);
                content = content.slice(0, insertPos + 1) + changelogEntry + '\n' + content.slice(insertPos + 1);
              }
            }
            
            // Clear лӢӨмқҢ мһ‘м—…
            content = content.replace(/## лӢӨмқҢ мһ‘м—…\n((?:- \[ \].*\n)*)/, '## лӢӨмқҢ мһ‘м—…\n- (м—ҶмқҢ)\n');
            
            // Clear blockers
            content = content.replace(/## лё”лЎңм»Ө\n-.*$/m, '## лё”лЎңм»Ө\n- м—ҶмқҢ');
            
            fs.writeFileSync(statusPath, content);
            core.info(`Updated ${statusPath}`);
            
            // Also update TESTS.md вҖ” mark items as passed
            const testsPath = `${taskBase}/${slugDir}/TESTS.md`;
            if (fs.existsSync(testsPath)) {
              let testsContent = fs.readFileSync(testsPath, 'utf8');
              testsContent = testsContent.replace(/в¬ң/g, 'вң…');
              testsContent = testsContent.replace(/\*\*кІ°кіј\*\*:.*$/m, '**кІ°кіј**: нҶөкіј');
              testsContent = testsContent.replace(/\*\*кІҖмҰқ мқјмһҗ\*\*:.*$/m, `**кІҖмҰқ мқјмһҗ**: ${today}`);
              fs.writeFileSync(testsPath, testsContent);
              core.info(`Updated ${testsPath}`);
            }
          
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tasks/
          git diff --staged --quiet || git commit -m "chore: auto-update CLE2 task status (PR #${{ github.event.pull_request.number }} merged)"
          git push
