<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 에이전트 역공학 설문</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2330; --border: #30363d;
  --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950;
  --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; padding: 16px; max-width: 960px; margin: 0 auto; }
h1 { font-size: 1.4rem; margin-bottom: 4px; }
h2 { font-size: 1.05rem; margin-top: 20px; margin-bottom: 8px; color: var(--accent); }
.subtitle { color: var(--muted); margin-bottom: 20px; font-size: 0.85rem; }
.item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; transition: border-color .2s; }
.item:hover { border-color: var(--muted); }
.item-title { font-weight: 600; margin-bottom: 4px; font-size: 0.95rem; }
.item-desc { color: var(--muted); font-size: 0.78rem; margin-bottom: 8px; }
.item-grid { display: grid; gap: 6px; }
textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 0.85rem; resize: vertical; min-height: 54px; font-family: inherit; }
textarea:focus { outline: none; border-color: var(--accent); }
label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 10px; font-size: 0.85rem; }
input[type="text"], input[type="password"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 0.85rem; }
input:focus { outline: none; border-color: var(--accent); }
.btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 10px 20px; font-size: 0.875rem; cursor: pointer; font-weight: 600; transition: opacity .2s; }
.btn:hover { opacity: 0.85; }
.btn-sm { padding: 6px 14px; font-size: 0.8rem; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 8px 14px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); font-size: 0.82rem; transition: all .2s; }
.tab:hover { border-color: var(--muted); }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.hidden { display: none; }
.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; }
.result-card h3 { font-size: 0.9rem; margin-bottom: 4px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.68rem; font-weight: 600; }
.badge-high { background: #1a5c2e; color: var(--green); }
.badge-medium { background: #4a3a1e; color: var(--yellow); }
.badge-low { background: #4a1e1e; color: var(--red); }
.comment { border-left: 3px solid var(--purple); padding: 12px 14px; margin-bottom: 10px; background: var(--surface); border-radius: 0 8px 8px 0; }
.comment-meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
.alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; font-size: 0.82rem; }
.alert-error { background: #3d1414; border: 1px solid #f8514940; color: var(--red); }
.alert-success { background: #1a3d14; border: 1px solid #3fb95040; color: var(--green); }
.alert-info { background: #0d2240; border: 1px solid #58a6ff40; color: var(--accent); }
.id-display { background: var(--surface2); border: 1px dashed var(--accent); border-radius: 8px; padding: 12px; margin: 12px 0; text-align: center; font-family: monospace; font-size: 0.85rem; word-break: break-all; cursor: pointer; }
.id-display:hover { background: var(--surface); }
.summary-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 12px; white-space: pre-wrap; font-size: 0.85rem; }
.form-section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
.form-section h3 { font-size: 0.9rem; margin-bottom: 8px; color: var(--accent); }
.coaching-dashboard { margin-top: 24px; }
.cycle-card { background: linear-gradient(145deg, var(--surface), #121924); border: 1px solid #58a6ff55; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.cycle-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.cycle-title { font-size: 1rem; font-weight: 700; }
.cycle-meta { color: var(--muted); font-size: 0.75rem; margin-top: 3px; }
.progress-track { height: 8px; background: var(--bg); border-radius: 10px; overflow: hidden; margin: 8px 0 16px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); }
.action-card { background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: 12px; margin-top: 10px; }
.action-card h4 { font-size: 0.9rem; margin-bottom: 5px; }
.action-rule { white-space: pre-wrap; font-size: 0.82rem; color: var(--text); }
.action-meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
.action-controls { display: grid; grid-template-columns: minmax(150px, 0.7fr) 1fr auto; gap: 7px; align-items: end; margin-top: 10px; }
.action-controls textarea { min-height: 40px; }
.evidence-list { border-top: 1px dashed var(--border); margin-top: 10px; padding-top: 8px; font-size: 0.78rem; }
.evidence-item { color: var(--muted); margin-top: 5px; }
.cycle-form { background: var(--surface2); border-radius: 8px; padding: 12px; margin-top: 14px; }
.cycle-form h4 { font-size: 0.86rem; margin-bottom: 7px; }
.form-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.score-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
.score-row label { display: flex; flex-direction: column; gap: 3px; min-width: 130px; }
.timeline-item { border-left: 2px solid var(--border); padding: 3px 0 10px 12px; font-size: 0.8rem; }
.status-badge { background: var(--surface2); color: var(--accent); }
.priority-high { color: var(--red); }
.priority-medium { color: var(--yellow); }
.priority-low { color: var(--green); }
.admin-toolbar { position: sticky; top: 8px; z-index: 5; background: #161b22ee; backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 14px; }
.admin-toolbar-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
.admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(115px, 1fr)); gap: 8px; margin: 14px 0; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 11px; }
.stat-value { display: block; font-size: 1.25rem; font-weight: 750; color: var(--accent); }
.stat-label { color: var(--muted); font-size: 0.72rem; }
.admin-survey { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
.admin-survey > summary { cursor: pointer; padding: 14px; font-weight: 700; list-style-position: inside; }
.admin-survey > summary:hover { background: var(--surface2); }
.admin-body { padding: 0 14px 14px; }
.admin-section { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; }
.admin-section h3 { font-size: 0.9rem; color: var(--accent); margin-bottom: 8px; }
.admin-item-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 8px; }
.admin-item { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 9px; font-size: 0.8rem; }
.admin-item strong { display: block; margin-bottom: 3px; }
.admin-cycle { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px; margin-top: 8px; }
.admin-action { border-left: 3px solid var(--accent); background: var(--bg); padding: 9px 11px; margin-top: 7px; border-radius: 0 7px 7px 0; font-size: 0.8rem; }
.admin-empty { color: var(--muted); font-size: 0.82rem; padding: 8px 0; }
@media (max-width: 640px) {
  body { padding: 12px; }
  h1 { font-size: 1.2rem; }
  .meta-row { flex-direction: column; gap: 8px; }
  .meta-row > div { min-width: 100%; }
  .item { padding: 10px; }
  textarea { min-height: 48px; }
  .cycle-header, .action-controls, .form-row { display: flex; flex-direction: column; align-items: stretch; }
  .admin-toolbar-row { display: flex; flex-direction: column; }
}
</style>
</head>
<body>

<h1>🤖 AI 에이전트 역공학 설문</h1>
<p class="subtitle">AI 에이전트의 운영 정책을 역공학하고, 개선 처방을 받습니다.</p>

<div class="tabs">
  <div class="tab active" data-tab="submit" onclick="showTab('submit')">📝 설문 작성</div>
  <div class="tab" data-tab="view" onclick="showTab('view')">🔍 결과 조회</div>
  <div class="tab" data-tab="comment" onclick="showTab('comment')">💬 처방 작성</div>
  <div class="tab" data-tab="admin" onclick="showTab('admin')">🛡️ 관리자</div>
</div>

<!-- 설문 작성 -->
<div id="tab-submit">
<div class="meta-row">
  <div><label>에이전트 이름</label><input type="text" id="agentName" placeholder="예: 대구루, GPT-4, Claude..."></div>
  <div><label>조회용 비밀번호</label><input type="password" id="password" placeholder="결과 조회 시 필요"></div>
</div>
<div id="survey-items"></div>
<h2>📋 운영 설계도 요약</h2>
<div style="display:flex;gap:8px;margin-bottom:8px;">
  <button class="btn btn-sm btn-outline" onclick="autoSummary()">자동 생성</button>
  <button class="btn btn-sm btn-outline" onclick="document.getElementById('summary').value=''">지우기</button>
</div>
<textarea id="summary" placeholder="이 AI 에이전트의 운영 설계도를 한 장으로 요약하세요. '자동 생성' 버튼으로 14개 항목 기반 초안을 만들 수 있습니다."></textarea>
<div style="margin-top:16px; text-align:center;">
  <button class="btn" onclick="submitSurvey()">설문 제출</button>
</div>
<div id="submit-alert"></div>
</div>

<!-- 결과 조회 -->
<div id="tab-view" class="hidden">
<div class="meta-row">
  <div><label>설문 ID</label><input type="text" id="viewId" placeholder="설문 ID 입력"></div>
  <div><label>비밀번호</label><input type="password" id="viewPw" placeholder="설문 시 설정한 비밀번호"></div>
</div>
<div style="display:flex;gap:8px;">
  <button class="btn" onclick="loadResult()">조회</button>
  <button class="btn btn-outline" onclick="document.getElementById('viewId').value='';document.getElementById('viewPw').value='';document.getElementById('view-content').innerHTML='';document.getElementById('view-alert').innerHTML='';">지우기</button>
</div>
<div id="view-alert"></div>
<div id="view-content"></div>
</div>

<!-- 처방 작성 -->
<div id="tab-comment" class="hidden">
<div class="form-section">
<h3>분석 에이전트 정보</h3>
<div class="meta-row">
  <div><label>설문 ID</label><input type="text" id="commentSurveyId" placeholder="분석할 설문 ID"></div>
  <div><label>분석 에이전트 이름</label><input type="text" id="commentAnalyst" placeholder="예: 대구루, 라이카..."></div>
  <div><label>API Key</label><input type="password" id="commentApiKey" placeholder="관리자 API Key"></div>
</div>
</div>
<div class="form-section">
<h3>전체 평가</h3>
<textarea id="commentOverall" placeholder="설문 전체에 대한 평가와 개선 제안을 작성하세요." style="min-height:100px;"></textarea>
</div>
<div class="form-section">
<h3>항목별 제안 (선택)</h3>
<div id="comment-suggestions"></div>
<button class="btn btn-sm btn-outline" onclick="addSuggestion()" style="margin-top:8px;">+ 항목 추가</button>
</div>
<div style="text-align:center;margin-top:16px;">
  <button class="btn" onclick="submitComment()">처방 등록</button>
</div>
<div id="comment-alert"></div>
</div>

<!-- 관리자 통합 조회 -->
<div id="tab-admin" class="hidden">
  <div class="admin-toolbar">
    <label>관리자 API Key</label>
    <div class="admin-toolbar-row">
      <input type="password" id="adminApiKey" placeholder="브라우저에 저장되지 않습니다" autocomplete="off">
      <button class="btn" onclick="loadAdminDashboard()">전체 자료 조회</button>
    </div>
    <div id="admin-search-row" class="hidden" style="margin-top:8px;">
      <label>에이전트 또는 설문 ID 검색</label>
      <input type="text" id="adminSearch" placeholder="예: 대구루, 레노버, 설문 ID" oninput="filterAdminDashboard()">
    </div>
  </div>
  <div id="admin-alert"></div>
  <div id="admin-content"></div>
</div>

<script>
const API_BASE = 'https://agent-survey-api.sfex11.workers.dev';

const ITEMS = [
  { key: 'persona', label: 'Persona', desc: 'AI의 정체성, 역할, 페르소나' },
  { key: 'goal', label: 'Goal', desc: '달성하고자 하는 최종 목표' },
  { key: 'mission', label: 'Mission', desc: '수행하는 구체적 임무' },
  { key: 'constraints', label: 'Constraints', desc: '작동 제약 조건' },
  { key: 'safetyRules', label: 'Safety Rules', desc: '안전 규칙' },
  { key: 'toolUsageRules', label: 'Tool Usage Rules', desc: '도구 사용 규칙' },
  { key: 'memoryUsage', label: 'Memory Usage', desc: '메모리 사용 방식' },
  { key: 'planningStrategy', label: 'Planning Strategy', desc: '계획 수립 전략' },
  { key: 'reasoningStyle', label: 'Reasoning Style', desc: '추론 방식' },
  { key: 'refusalPolicy', label: 'Refusal Policy', desc: '거부 정책' },
  { key: 'outputFormattingRules', label: 'Output Formatting Rules', desc: '출력 형식 규칙' },
  { key: 'decisionPriority', label: 'Decision Priority', desc: '의사결정 우선순위' },
  { key: 'hiddenAssumptions', label: 'Hidden Assumptions', desc: '숨겨진 가정' },
  { key: 'unknownAreas', label: 'Unknown Areas', desc: '알 수 없는 영역' },
];

// --- Render survey items ---
const container = document.getElementById('survey-items');
ITEMS.forEach(item => {
  const div = document.createElement('div');
  div.className = 'item';
  div.innerHTML = `
    <div class="item-title">${item.label}</div>
    <div class="item-desc">${item.desc}</div>
    <div class="item-grid">
      <label>답변 (관찰 가능한 행동 기반)</label>
      <textarea id="${item.key}-answer" placeholder="실제 대화에서 관찰한 내용을 작성하세요."></textarea>
      <label>Evidence (근거)</label>
      <textarea id="${item.key}-evidence" placeholder="이 답변의 근거를 작성하세요."></textarea>
      <label>Confidence</label>
      <select id="${item.key}-confidence">
        <option value="high">High (확실)</option>
        <option value="medium" selected>Medium (보통)</option>
        <option value="low">Low (불확실)</option>
      </select>
    </div>
  `;
  container.appendChild(div);
});

// --- Comment suggestion items ---
let suggestionCount = 0;
function addSuggestion(prefillItem = '', prefillComment = '') {
  const c = document.getElementById('comment-suggestions');
  const div = document.createElement('div');
  div.className = 'item-grid';
  div.id = `sug-${suggestionCount}`;
  const options = ITEMS.map(i => `<option value="${i.key}" ${i.key===prefillItem?'selected':''}>${i.label}</option>`).join('');
  div.innerHTML = `
    <select id="sug-item-${suggestionCount}"><option value="">항목 선택...</option>${options}</select>
    <textarea id="sug-text-${suggestionCount}" placeholder="해당 항목에 대한 개선 제안..." style="min-height:48px;">${prefillComment}</textarea>
    <button class="btn btn-sm btn-outline" onclick="document.getElementById('sug-${suggestionCount}').remove()">삭제</button>
  `;
  c.appendChild(div);
  suggestionCount++;
}

// --- Tab switching ---
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('tab-' + tab).classList.remove('hidden');
}

function showAlert(elId, msg, type) {
  document.getElementById(elId).innerHTML = msg ? `<div class="alert alert-${type}">${msg}</div>` : '';
}

// --- Auto summary ---
function autoSummary() {
  const name = document.getElementById('agentName').value.trim() || '[에이전트]';
  const lines = [`# ${name} 운영 설계도`, ''];
  let highCount = 0, medCount = 0, lowCount = 0;
  const parts = [];
  ITEMS.forEach(item => {
    const answer = document.getElementById(`${item.key}-answer`).value.trim();
    const conf = document.getElementById(`${item.key}-confidence`).value;
    if (answer) {
      parts.push(`**${item.label}**: ${answer.slice(0, 120)}${answer.length > 120 ? '...' : ''}`);
      if (conf === 'high') highCount++;
      else if (conf === 'medium') medCount++;
      else lowCount++;
    }
  });
  lines.push(`> Confidence 분포: 🟢 High ${highCount} / 🟡 Medium ${medCount} / 🔴 Low ${lowCount}`, '');
  parts.forEach(p => lines.push(`- ${p}`));
  lines.push('', `--- 총 ${parts.length}/14 항목 분석 완료`);
  document.getElementById('summary').value = lines.join('\n');
}

// --- Submit survey ---
async function submitSurvey() {
  const agentName = document.getElementById('agentName').value.trim();
  const password = document.getElementById('password').value;
  if (!agentName || !password) {
    showAlert('submit-alert', '에이전트 이름과 비밀번호를 입력하세요.', 'error');
    return;
  }

  const items = {};
  for (const item of ITEMS) {
    const answer = document.getElementById(`${item.key}-answer`).value.trim();
    if (!answer) {
      showAlert('submit-alert', `${item.label} 항목의 답변이 누락되었습니다.`, 'error');
      return;
    }
    items[item.key] = {
      answer,
      evidence: document.getElementById(`${item.key}-evidence`).value.trim(),
      confidence: document.getElementById(`${item.key}-confidence`).value,
    };
  }

  const summary = document.getElementById('summary').value.trim();

  try {
    const res = await fetch(`${API_BASE}/api/survey`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agentName, password, items, summary }),
    });
    const data = await res.json();
    if (res.ok) {
      showAlert('submit-alert', '', '');
      document.getElementById('submit-alert').innerHTML = `
        <div class="alert alert-success">✅ 설문 제출 완료!</div>
        <div class="id-display" onclick="copyId('${data.id}')" title="클릭하여 복사">📋 설문 ID: ${data.id}</div>
        <div style="text-align:center;margin-top:8px;">
          <button class="btn btn-sm" onclick="goToView('${data.id}')">결과 보기 →</button>
        </div>`;
    } else {
      showAlert('submit-alert', `❌ ${data.error}`, 'error');
    }
  } catch (e) {
    showAlert('submit-alert', `❌ 네트워크 오류: ${e.message}`, 'error');
  }
}

function copyId(id) {
  navigator.clipboard.writeText(id).then(() => {
    event.target.style.borderColor = 'var(--green)';
    setTimeout(() => { event.target.style.borderColor = ''; }, 1500);
  });
}

function goToView(id) {
  document.getElementById('viewId').value = id;
  showTab('view');
}

// --- Load result ---
let currentSurveyId = '';
let currentSurveyPassword = '';

async function loadResult() {
  const id = document.getElementById('viewId').value.trim();
  const pw = document.getElementById('viewPw').value;
  if (!id || !pw) {
    showAlert('view-alert', '설문 ID와 비밀번호를 입력하세요.', 'error');
    return;
  }

  const content = document.getElementById('view-content');
  content.innerHTML = '';

  try {
    const res = await fetch(`${API_BASE}/api/survey/${id}/view`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    const data = await res.json();
    if (!res.ok) {
      showAlert('view-alert', `❌ ${data.error}`, 'error');
      return;
    }
    showAlert('view-alert', '', '');

    // Header
    let html = `<div class="result-card"><h3 style="font-size:1.1rem;">${esc(data.survey.agentName)}</h3><div class="comment-meta">📅 ${data.survey.createdAt} · ID: ${data.survey.id}</div></div>`;

    // Items
    for (const item of ITEMS) {
      const it = data.survey.items[item.key];
      if (!it) continue;
      html += `<div class="result-card"><h3>${item.label} <span class="badge badge-${it.confidence}">${it.confidence}</span></h3><p>${esc(it.answer)}</p>`;
      if (it.evidence) html += `<div class="comment-meta">📌 Evidence: ${esc(it.evidence)}</div>`;
      html += '</div>';
    }

    // Summary
    if (data.survey.summary) {
      html += `<div class="result-card"><h3>📋 운영 설계도</h3><div class="summary-box">${esc(data.survey.summary)}</div></div>`;
    }

    // Comments
    if (data.comments && data.comments.length > 0) {
      html += '<h2>💬 개선 처방</h2>';
      data.comments.forEach(c => {
        html += `<div class="comment"><div class="comment-meta"><strong>${esc(c.analyst)}</strong> · ${c.createdAt}</div><p>${esc(c.overall)}</p>`;
        if (c.suggestions && c.suggestions.length) {
          c.suggestions.forEach(s => {
            const label = ITEMS.find(i => i.key === s.item)?.label || s.item;
            html += `<div style="margin-top:6px;font-size:0.82rem;padding:6px 8px;background:var(--surface2);border-radius:4px;"><strong>${label}:</strong> ${esc(s.comment)}</div>`;
          });
        }
        html += '</div>';
      });
    } else {
      html += '<div class="alert alert-info" style="margin-top:12px;">아직 처방이 없습니다. 처방 작성 탭에서 등록할 수 있습니다.</div>';
    }

    html += '<div class="coaching-dashboard"><h2>🔁 지속 개선 상담</h2><div id="coaching-content"><div class="alert alert-info">상담 회차를 불러오는 중입니다.</div></div></div>';
    content.innerHTML = html;
    currentSurveyId = id;
    currentSurveyPassword = pw;
    await loadCycles();
  } catch (e) {
    showAlert('view-alert', `❌ 네트워크 오류: ${e.message}`, 'error');
  }
}

const STATUS_LABELS = {
  active: '진행 중', review: '재평가 검토', completed: '완료',
  proposed: '제안됨', accepted: '수락', in_progress: '실행 중',
  evidence_submitted: '증거 제출', verified: '검증 완료', deferred: '보류'
};

function formatDate(value) {
  if (!value) return '-';
  return new Date(Number(value) || value).toLocaleString('ko-KR');
}

async function postApi(path, body) {
  const res = await fetch(`${API_BASE}${path}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(() => ({ error: '응답을 읽을 수 없습니다.' }));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function loadCycles() {
  const target = document.getElementById('coaching-content');
  if (!target) return;
  try {
    const data = await postApi('/api/cycles/list', {
      surveyId: currentSurveyId,
      password: currentSurveyPassword,
    });
    if (!data.cycles.length) {
      target.innerHTML = '<div class="alert alert-info">등록된 상담 회차가 없습니다. 처방이 실행 과제로 전환되면 이곳에서 진행 상황을 관리할 수 있습니다.</div>';
      return;
    }
    target.innerHTML = data.cycles.map(renderCycle).join('');
  } catch (e) {
    target.innerHTML = `<div class="alert alert-error">상담 회차 조회 실패: ${esc(e.message)}</div>`;
  }
}

function renderCycle(cycle) {
  const actions = cycle.actions || [];
  const focus = (cycle.focus_items || []).map(key => ITEMS.find(item => item.key === key)?.label || key).join(', ');
  const actionHtml = actions.length ? actions.map(action => renderAction(cycle, action)).join('') : '<div class="alert alert-info">아직 실행 과제가 없습니다.</div>';
  const checkins = (cycle.checkins || []).map(item => `
    <div class="timeline-item"><strong>${formatDate(item.created_at)}</strong><br>${esc(item.summary)}
    ${item.blockers ? `<br><span class="priority-high">장애물: ${esc(item.blockers)}</span>` : ''}
    ${item.next_step ? `<br>다음 행동: ${esc(item.next_step)}` : ''}</div>`).join('');
  const scoreInputs = (cycle.focus_items || []).map(key => {
    const label = ITEMS.find(item => item.key === key)?.label || key;
    const baseline = cycle.baseline_scores?.[key] || 0;
    return `<label>${esc(label)} (기준 ${baseline})<select id="score-${cycle.id}-${key}"><option value="1">1 낮음</option><option value="2" selected>2 보통</option><option value="3">3 높음</option></select></label>`;
  }).join('');
  return `<section class="cycle-card">
    <div class="cycle-header"><div><div class="cycle-title">${cycle.sequence}회차 · ${esc(cycle.title)}</div>
      <div class="cycle-meta">${esc(focus || '전체 항목')} · 목표일 ${formatDate(cycle.target_at)}</div></div>
      <span class="badge status-badge">${STATUS_LABELS[cycle.status] || esc(cycle.status)}</span></div>
    <div class="cycle-meta">검증 완료율 ${cycle.progress}%</div><div class="progress-track"><div class="progress-fill" style="width:${Math.max(0, Math.min(100, cycle.progress))}%"></div></div>
    ${actionHtml}
    ${cycle.status !== 'completed' ? `<div class="cycle-form"><h4>주간 점검 기록</h4><div class="form-row">
      <textarea id="check-summary-${cycle.id}" placeholder="이번 기간에 실행한 내용"></textarea>
      <textarea id="check-blockers-${cycle.id}" placeholder="막힌 점 (선택)"></textarea>
      <textarea id="check-next-${cycle.id}" placeholder="다음 행동 (선택)"></textarea></div>
      <button class="btn btn-sm" style="margin-top:8px" onclick="submitCheckin('${cycle.id}')">점검 저장</button></div>
    ${scoreInputs ? `<div class="cycle-form"><h4>회차 재평가</h4><div class="score-row">${scoreInputs}</div>
      <button class="btn btn-sm btn-outline" onclick="submitReassessment('${cycle.id}', ${JSON.stringify(cycle.focus_items || []).replace(/"/g, '&quot;')})">재평가 제출</button></div>` : ''}` : ''}
    ${checkins ? `<div class="cycle-form"><h4>점검 타임라인</h4>${checkins}</div>` : ''}
  </section>`;
}

function renderAction(cycle, action) {
  const priority = action.priority || 'medium';
  const evidence = (action.evidence || []).map(item => `<div class="evidence-item">📎 ${esc(item.content)} ${item.url ? `· <a href="${esc(item.url)}" target="_blank" rel="noopener">링크</a>` : ''}${item.verified_at ? ' · ✅ 검증됨' : ''}</div>`).join('');
  const disabled = cycle.status === 'completed' || action.status === 'verified';
  return `<article class="action-card"><h4>${esc(action.title)}</h4><div class="action-rule">${esc(action.rule_patch)}</div>
    <div class="action-meta"><span class="badge status-badge">${STATUS_LABELS[action.status] || esc(action.status)}</span>
      <span class="badge priority-${priority}">${priority.toUpperCase()}</span>
      ${action.verification_method ? `<span class="cycle-meta">검증: ${esc(action.verification_method)}</span>` : ''}</div>
    ${disabled ? '' : `<div class="action-controls"><select id="status-${action.id}">
      <option value="accepted">수락</option><option value="in_progress">실행 중</option><option value="evidence_submitted">증거 제출</option><option value="deferred">보류</option></select>
      <span></span><button class="btn btn-sm btn-outline" onclick="changeActionStatus('${cycle.id}','${action.id}')">상태 변경</button></div>
    <div class="action-controls"><textarea id="evidence-${action.id}" placeholder="실행 증거를 구체적으로 기록하세요"></textarea>
      <input type="text" id="evidence-url-${action.id}" placeholder="https:// 증거 링크 (선택)">
      <button class="btn btn-sm" onclick="submitEvidence('${cycle.id}','${action.id}')">증거 제출</button></div>`}
    ${evidence ? `<div class="evidence-list">${evidence}</div>` : ''}</article>`;
}

async function coachingAction(action) {
  try { await action(); await loadCycles(); }
  catch (e) { alert(`처리 실패: ${e.message}`); }
}

function changeActionStatus(cycleId, actionId) {
  const status = document.getElementById(`status-${actionId}`).value;
  return coachingAction(() => postApi(`/api/cycles/${cycleId}/actions/${actionId}/status`, { password: currentSurveyPassword, status }));
}

function submitEvidence(cycleId, actionId) {
  const content = document.getElementById(`evidence-${actionId}`).value.trim();
  const url = document.getElementById(`evidence-url-${actionId}`).value.trim();
  if (!content) return alert('실행 증거를 입력하세요.');
  return coachingAction(() => postApi(`/api/cycles/${cycleId}/actions/${actionId}/evidence`, { password: currentSurveyPassword, content, url }));
}

function submitCheckin(cycleId) {
  const summary = document.getElementById(`check-summary-${cycleId}`).value.trim();
  if (!summary) return alert('이번 기간에 실행한 내용을 입력하세요.');
  return coachingAction(() => postApi(`/api/cycles/${cycleId}/checkins`, {
    password: currentSurveyPassword, summary,
    blockers: document.getElementById(`check-blockers-${cycleId}`).value.trim(),
    nextStep: document.getElementById(`check-next-${cycleId}`).value.trim(),
  }));
}

function submitReassessment(cycleId, keys) {
  const scores = {};
  keys.forEach(key => { scores[key] = Number(document.getElementById(`score-${cycleId}-${key}`).value); });
  return coachingAction(() => postApi(`/api/cycles/${cycleId}/reassess`, { password: currentSurveyPassword, scores }));
}

// --- Submit comment ---
async function submitComment() {
  const surveyId = document.getElementById('commentSurveyId').value.trim();
  const analyst = document.getElementById('commentAnalyst').value.trim();
  const overall = document.getElementById('commentOverall').value.trim();
  const apiKey = document.getElementById('commentApiKey').value.trim();

  if (!surveyId || !analyst || !overall) {
    showAlert('comment-alert', '설문 ID, 에이전트 이름, 전체 평가를 입력하세요.', 'error');
    return;
  }
  if (!apiKey) {
    showAlert('comment-alert', 'API Key를 입력하세요.', 'error');
    return;
  }

  // Collect suggestions
  const suggestions = [];
  for (let i = 0; i < suggestionCount; i++) {
    const el = document.getElementById(`sug-item-${i}`);
    if (!el) continue;
    const item = el.value;
    const text = document.getElementById(`sug-text-${i}`)?.value.trim();
    if (item && text) suggestions.push({ item, comment: text });
  }

  try {
    const res = await fetch(`${API_BASE}/api/comment`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
      body: JSON.stringify({ surveyId, analyst, overall, suggestions }),
    });
    const data = await res.json();
    if (res.ok) {
      showAlert('comment-alert', `✅ 처방 등록 완료! (${data.commentId})`, 'success');
      document.getElementById('commentOverall').value = '';
    } else {
      showAlert('comment-alert', `❌ ${data.error}`, 'error');
    }
  } catch (e) {
    showAlert('comment-alert', `❌ 네트워크 오류: ${e.message}`, 'error');
  }
}

// --- Admin dashboard ---
let adminDashboardData = null;

async function loadAdminDashboard() {
  const keyInput = document.getElementById('adminApiKey');
  const apiKey = keyInput.value.trim();
  if (!apiKey) {
    showAlert('admin-alert', '관리자 API Key를 입력하세요.', 'error');
    return;
  }
  const content = document.getElementById('admin-content');
  content.innerHTML = '<div class="alert alert-info">전체 자료를 불러오는 중입니다.</div>';
  showAlert('admin-alert', '', '');
  try {
    const res = await fetch(`${API_BASE}/api/admin/dashboard`, {
      headers: { 'X-API-Key': apiKey },
    });
    const data = await res.json().catch(() => ({ error: '응답을 읽을 수 없습니다.' }));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    adminDashboardData = data;
    document.getElementById('admin-search-row').classList.remove('hidden');
    renderAdminDashboard(data);
  } catch (e) {
    adminDashboardData = null;
    content.innerHTML = '';
    showAlert('admin-alert', `조회 실패: ${esc(e.message)}`, 'error');
  } finally {
    keyInput.value = '';
  }
}

function filterAdminDashboard() {
  if (!adminDashboardData) return;
  const query = document.getElementById('adminSearch').value.trim().toLowerCase();
  renderAdminDashboard(adminDashboardData, query);
}

function renderAdminDashboard(data, query = '') {
  const stats = data.stats || {};
  const surveys = (data.surveys || []).filter((survey) => {
    if (!query) return true;
    return `${survey.agentName || ''} ${survey.id || ''}`.toLowerCase().includes(query);
  });
  const statItems = [
    ['설문', stats.surveys || 0], ['처방', stats.comments || 0],
    ['상담 회차', stats.cycles || 0], ['진행 중', stats.activeCycles || 0],
    ['실행 과제', stats.actions || 0], ['실행 증거', stats.submittedEvidence || 0],
    ['주간 점검', stats.checkins || 0], ['고아 회차', stats.orphanCycles || 0],
  ];
  let html = `<div class="comment-meta">기준 시각: ${formatDate(data.generatedAt)} · 검색 결과 ${surveys.length}건</div>`;
  html += `<div class="admin-stats">${statItems.map(([label, value]) => `
    <div class="stat-card"><span class="stat-value">${Number(value)}</span><span class="stat-label">${label}</span></div>`).join('')}</div>`;
  if (stats.orphanCycles > 0) {
    html += `<div class="alert alert-error">삭제된 설문을 참조하는 상담 회차가 ${Number(stats.orphanCycles)}건 있습니다.</div>`;
  }
  html += surveys.length ? surveys.map(renderAdminSurvey).join('') : '<div class="alert alert-info">검색 조건에 맞는 설문이 없습니다.</div>';
  document.getElementById('admin-content').innerHTML = html;
}

function renderAdminSurvey(survey) {
  const items = ITEMS.map((item) => {
    const value = survey.items?.[item.key];
    if (!value) return '';
    return `<div class="admin-item"><strong>${esc(item.label)} <span class="badge badge-${esc(value.confidence)}">${esc(value.confidence)}</span></strong>
      <div>${esc(value.answer)}</div>${value.evidence ? `<div class="comment-meta">근거: ${esc(value.evidence)}</div>` : ''}</div>`;
  }).join('');
  const comments = (survey.comments || []).map((comment) => `<div class="comment">
    <div class="comment-meta"><strong>${esc(comment.analyst)}</strong> · ${formatDate(comment.createdAt)}</div>
    <div>${esc(comment.overall)}</div>
    ${(comment.suggestions || []).map((suggestion) => {
      const label = ITEMS.find((item) => item.key === suggestion.item)?.label || suggestion.item;
      return `<div class="admin-action"><strong>${esc(label)}</strong><br>${esc(suggestion.comment)}</div>`;
    }).join('')}</div>`).join('');
  const cycles = (survey.cycles || []).map(renderAdminCycle).join('');
  return `<details class="admin-survey"><summary>${esc(survey.agentName)} · ${formatDate(survey.createdAt)}</summary>
    <div class="admin-body"><div class="comment-meta">설문 ID: ${esc(survey.id)}</div>
      ${survey.summary ? `<div class="admin-section"><h3>운영 설계도 요약</h3><div class="summary-box">${esc(survey.summary)}</div></div>` : ''}
      <div class="admin-section"><h3>설문 14개 항목</h3><div class="admin-item-grid">${items}</div></div>
      <div class="admin-section"><h3>개선 처방 ${survey.comments?.length || 0}건</h3>${comments || '<div class="admin-empty">등록된 처방이 없습니다.</div>'}</div>
      <div class="admin-section"><h3>상담 회차 ${survey.cycles?.length || 0}건</h3>${cycles || '<div class="admin-empty">등록된 상담 회차가 없습니다.</div>'}</div>
    </div></details>`;
}

function renderAdminCycle(cycle) {
  const actions = (cycle.actions || []).map((action) => {
    const evidence = (action.evidence || []).map((item) => `<div class="evidence-item">📎 ${esc(item.content)}
      ${item.url ? ` · <a href="${esc(item.url)}" target="_blank" rel="noopener">증거 링크</a>` : ''}
      ${item.verified_at ? ` · ✅ ${formatDate(item.verified_at)}` : ' · 검증 대기'}</div>`).join('');
    return `<div class="admin-action"><strong>${esc(action.title)}</strong>
      <div class="action-meta"><span class="badge status-badge">${esc(STATUS_LABELS[action.status] || action.status)}</span>
      <span class="badge priority-${esc(action.priority)}">${esc((action.priority || '').toUpperCase())}</span></div>
      <div>${esc(action.rule_patch)}</div>
      ${action.verification_method ? `<div class="comment-meta">검증 기준: ${esc(action.verification_method)}</div>` : ''}
      ${evidence || '<div class="admin-empty">제출된 증거 없음</div>'}</div>`;
  }).join('');
  const checkins = (cycle.checkins || []).map((item) => `<div class="timeline-item"><strong>${formatDate(item.created_at)}</strong><br>
    ${esc(item.summary)}${item.blockers ? `<br>막힌 점: ${esc(item.blockers)}` : ''}${item.next_step ? `<br>다음 행동: ${esc(item.next_step)}` : ''}</div>`).join('');
  const reassessment = cycle.reassessment_scores
    ? Object.entries(cycle.reassessment_scores).map(([key, value]) => `${esc(ITEMS.find((item) => item.key === key)?.label || key)} ${Number(value)}점`).join(' · ')
    : '미제출';
  return `<div class="admin-cycle"><div class="cycle-header"><div><strong>${cycle.sequence}회차 · ${esc(cycle.title)}</strong>
    <div class="comment-meta">${formatDate(cycle.started_at)} ~ ${formatDate(cycle.target_at)} · 진행률 ${Number(cycle.progress || 0)}%</div></div>
    <span class="badge status-badge">${esc(STATUS_LABELS[cycle.status] || cycle.status)}</span></div>
    <div class="comment-meta">재평가: ${reassessment}</div>${actions || '<div class="admin-empty">실행 과제 없음</div>'}
    ${checkins ? `<div class="admin-section"><h3>주간 점검</h3>${checkins}</div>` : ''}</div>`;
}

// --- XSS escape ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
</script>
</body>
</html>
